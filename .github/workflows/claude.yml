# Reusable workflow: run the SimpleMotion Claude bot in a calling repo.
#
# Identity model (see docs/claude-github-app.md):
#   - The family's GitHub App private key NEVER lives in GitHub.
#   - This workflow proves its identity to Entra ID via GitHub OIDC, pulls the
#     family key from Azure Key Vault at runtime, mints a 1-hour installation
#     token, and discards it. The only GitHub-stored secret is ANTHROPIC_API_KEY.
#
# Plugin association (optional): when `plugin` is set, the bot loads the matching
# Claude Code plugin from the enterprise marketplace (simplemotion/sm-plugins) so
# it carries that family's domain skills (e.g. the design family loads sm-design).
# The marketplace repo is `internal`, so it's checked out with a SEPARATE token
# minted from a shared, read-only "marketplace-reader" GitHub App — fetched from
# the same Key Vault via the family's Azure identity (which has read RBAC on that
# one secret). No long-lived credential, marketplace stays internal.
#
# Callers: see workflow-templates/claude.yml for the per-repo stub.
#
# Hardening note: third-party actions are pinned to release tags below for
# readability. Before enterprise rollout, repin each to a full commit SHA
# (see docs/claude-github-app.md "Hardening").

name: claude

on:
  workflow_call:
    inputs:
      app_id:
        description: "Family GitHub App ID"
        type: string
        required: true
      kv_name:
        description: "Azure Key Vault name holding the App private key"
        type: string
        required: true
      kv_secret_name:
        description: "Key Vault secret name for the family App private key (PEM)"
        type: string
        required: false
        default: claude-app-private-key
      azure_client_id:
        description: "Entra workload-identity (federated) app client ID"
        type: string
        required: true
      azure_tenant_id:
        description: "Entra tenant ID"
        type: string
        required: true
      azure_subscription_id:
        description: "Azure subscription ID for the Key Vault"
        type: string
        required: true
      plugin:
        description: "Marketplace plugin to load for this family (e.g. sm-design). Empty = no plugin."
        type: string
        required: false
        default: ""
      marketplace_owner:
        description: "Org that owns the plugin marketplace repo"
        type: string
        required: false
        default: "simplemotion"
      marketplace_repo:
        description: "Plugin marketplace repo name (within marketplace_owner)"
        type: string
        required: false
        default: "sm-plugins"
      marketplace_reader_app_id:
        description: "GitHub App ID of the shared read-only marketplace-reader app"
        type: string
        required: false
        default: ""
      marketplace_kv_secret:
        description: "Key Vault secret name holding the marketplace-reader App private key"
        type: string
        required: false
        default: "claude-marketplace-reader-key"
    secrets:
      anthropic_api_key:
        description: "Anthropic API key for the Claude Code action"
        required: true

jobs:
  claude:
    runs-on: ubuntu-latest
    # Must match the environment claim the federated credential is scoped to.
    environment: claude-bot
    permissions:
      id-token: write        # required to mint the GitHub OIDC token
      contents: write
      pull-requests: write
      issues: write
    steps:
      # 1. Exchange the GitHub OIDC token for an Azure access token. No secret;
      #    trust is anchored by the federated credential on the Entra app.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.azure_client_id }}
          tenant-id: ${{ inputs.azure_tenant_id }}
          subscription-id: ${{ inputs.azure_subscription_id }}

      # 2. Pull the family App private key from Key Vault into a masked output.
      - name: Fetch App private key from Key Vault
        id: key
        shell: bash
        run: |
          set -euo pipefail
          pem="$(az keyvault secret show \
                   --vault-name '${{ inputs.kv_name }}' \
                   --name '${{ inputs.kv_secret_name }}' \
                   --query value -o tsv)"
          # Mask every line so multi-line PEM never surfaces in logs.
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$pem"
          {
            echo "pem<<__PEM_EOF__"
            echo "$pem"
            echo "__PEM_EOF__"
          } >> "$GITHUB_OUTPUT"

      # 3. Mint a short-lived (1-hour), repo-scoped installation token.
      - name: Mint GitHub App installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ steps.key.outputs.pem }}

      # 4. Check out the calling repo with the App token (branch/push as the bot).
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.token.outputs.token }}
          fetch-depth: 0

      # ---- Optional: load this family's marketplace plugin -------------------
      # 5a. Fetch the shared marketplace-reader key (the family's Azure identity
      #     has read RBAC on this one secret).
      - name: Fetch marketplace-reader key from Key Vault
        id: rkey
        if: ${{ inputs.plugin != '' && inputs.marketplace_reader_app_id != '' }}
        shell: bash
        run: |
          set -euo pipefail
          pem="$(az keyvault secret show \
                   --vault-name '${{ inputs.kv_name }}' \
                   --name '${{ inputs.marketplace_kv_secret }}' \
                   --query value -o tsv)"
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$pem"
          {
            echo "pem<<__PEM_EOF__"
            echo "$pem"
            echo "__PEM_EOF__"
          } >> "$GITHUB_OUTPUT"

      # 5b. Mint a read-only token scoped to the marketplace repo only.
      - name: Mint marketplace-reader token
        id: rtoken
        if: ${{ inputs.plugin != '' && inputs.marketplace_reader_app_id != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ inputs.marketplace_reader_app_id }}
          private-key: ${{ steps.rkey.outputs.pem }}
          owner: ${{ inputs.marketplace_owner }}
          repositories: ${{ inputs.marketplace_repo }}

      # 5c. Check out the marketplace into ./.sm-plugins (after the caller
      #     checkout so it isn't cleaned away).
      - name: Checkout plugin marketplace
        if: ${{ inputs.plugin != '' && inputs.marketplace_reader_app_id != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', inputs.marketplace_owner, inputs.marketplace_repo) }}
          token: ${{ steps.rtoken.outputs.token }}
          path: .sm-plugins
          persist-credentials: false

      # 6. Run Claude as the family bot identity. When a plugin was checked out,
      #    load it for this session via --plugin-dir (its skills become available).
      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.token.outputs.token }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_args: ${{ (inputs.plugin != '' && inputs.marketplace_reader_app_id != '') && format('--plugin-dir .sm-plugins/plugins/{0}', inputs.plugin) || '' }}
