# SimpleMotion Claude bot — per-repo caller stub.
#
# Distributed org-wide via this repo's workflow-templates/ directory: it appears
# under "Actions → New workflow → SimpleMotion" for every repo in the org.
#
# Carries NO secrets. The privileged work (OIDC → Key Vault → token mint) lives
# in the central reusable workflow. The Azure IDs below are non-sensitive and
# are read from org-level Actions *variables* (vars), set once per org.

name: claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

# A reusable workflow's token scopes are CAPPED by the caller, and the org/repo
# default is read-only — so the caller must explicitly grant what the reusable
# workflow needs (id-token for OIDC; write to post comments and push branches).
# Without this the run fails at startup with a "workflow file issue".
permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    # Only react to an explicit @claude mention.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    uses: simplemotion/.github/.github/workflows/claude.yml@main
    with:
      app_id: ${{ vars.SM_CLAUDE_APP_ID }}
      kv_name: ${{ vars.SM_CLAUDE_KV_NAME }}
      # Per-family Key Vault secret holding THIS org's bot App private key.
      # Set per org by the provisioning script; if unset the reusable workflow
      # defaults to `claude-app-private-key` (the tier-0/simple family).
      kv_secret_name: ${{ vars.SM_CLAUDE_KV_SECRET }}
      azure_client_id: ${{ vars.SM_CLAUDE_AZURE_CLIENT_ID }}
      azure_tenant_id: ${{ vars.SM_AZURE_TENANT_ID }}
      azure_subscription_id: ${{ vars.SM_AZURE_SUBSCRIPTION_ID }}
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
